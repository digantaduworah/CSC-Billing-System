<!DOCTYPE html>
<html>
<head>
  <style>
    body{
      font-family: Arial;
      background:#f5f7fb;
      padding:15px;
    }
    .card{
      background:white;
      padding:15px;
      border-radius:12px;
      margin-bottom:15px;
    }
    input, select, button{
      width:100%;
      padding:10px;
      margin-top:10px;
    }
    button{
      background:#007bff;
      color:white;
      border:none;
      border-radius:8px;
    }
  </style>
</head>

<body>

<div class="card">

  <h2>Duarah Store - Order</h2>

  <!-- PHONE -->
  <input id="phone" placeholder="Enter Phone Number">

  <!-- SERVICE -->
<!-- 💰 TOTAL -->
<h3>Total: ₹ <span id="total">0</span></h3>

<!-- 💳 PAY BUTTON -->
<button id="payBtn" onclick="showQR()">💳 Pay Now</button>

<!-- 📲 QR SECTION (HIDDEN FIRST) -->
<div id="qrBox" style="display:none; text-align:center; margin-top:10px;">

  <p>Scan & Pay</p>
  <img src="paytm-qr.png" width="200">

  <br><br>

  <button onclick="submitOrder()">✅ I Paid, Submit Order</button>

</div>

</div>

<!-- TRACK SECTION -->
<div class="card">

  <h2>Track Your Order</h2>

  <input id="trackPhone" placeholder="Enter phone number">
  <button onclick="track()">Track</button>

  <div id="result"></div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>

<script src="firebase.js"></script>
<script src="app.js"></script>

<script>
function track(){

  let phone = document.getElementById("trackPhone").value;

  if(phone.length < 10){
    alert("Enter valid phone number");
    return;
  }

  db.collection("bookings")
  .where("phone","==",phone)
  .get()
  .then(snap=>{

    let html="";

    if(snap.empty){
      html = "<b>No orders found</b>";
    } else {

      snap.forEach(doc=>{
        let d = doc.data();

        let color = d.status === "Pending" ? "orange" :
                    d.status === "Processing" ? "blue" : "green";

        html += `
        <div style="border:1px solid ${color}; padding:10px; margin:10px; border-radius:10px;">
          <b>${d.service}</b><br>
          Order ID: ${d.orderId}<br>
          Amount: ₹${d.amount}<br>
          Status: <span style="color:${color}">${d.status}</span>
        </div>
        `;
      });

    }

    document.getElementById("result").innerHTML = html;

  });

}
</script>

</body>
</html>
